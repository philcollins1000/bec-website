backend:
  name: git-gateway
  branch: main

media_folder: images
public_folder: /images

site_url: https://baldonsevents.com

collections:
  - name: events
    label: Events
    label_singular: Event
    folder: _events
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - { label: Event name, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD, date_format: DD MMMM YYYY, time_format: false, picker_utc: true }
      - { label: Location, name: location, widget: string, hint: "e.g. Marsh Baldon Green" }
      - { label: Short description, name: summary, widget: text }
      - { label: Full description, name: body, widget: markdown }
      - label: Volunteers needed
        name: volunteers
        widget: list
        required: false
        hint: List each volunteer role on a separate line
        field: { label: Role, name: role, widget: string }
      - { label: Set-up time, name: setup_time, widget: string, required: false, hint: "e.g. Friday 2pm — marquee erection" }
      - { label: Take-down time, name: takedown_time, widget: string, required: false, hint: "e.g. Sunday 9am — marquee take-down" }
      - { label: Event photo, name: image, widget: image, required: false }
      - label: Status
        name: status
        widget: select
        options: [Upcoming, Past]
        default: Upcoming

  - name: funded
    label: What We Fund
    label_singular: Funded cause
    folder: _funded
    create: true
    fields:
      - { label: Organisation name, name: title, widget: string }
      - { label: Category, name: category, widget: string, hint: "e.g. Education, Community, Arts & culture" }
      - { label: Description, name: description, widget: text }
      - { label: Year funded, name: year, widget: string, required: false }

  - name: news
    label: News
    label_singular: News post
    folder: _news
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, picker_utc: true }
      - { label: Body, name: body, widget: markdown }
